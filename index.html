<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Tenor+Sans&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1714;
      --gold: #b8935a;
      --muted: #8a8278;
    }

    body {
      background-color: var(--ink);
      color: var(--cream);
      font-family: 'Tenor Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.4;
    }

    /* Soft radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184,147,90,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 680px;
      width: 100%;
      animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .rule-top {
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .rule-top span { font-size: 0.65rem; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; }
    .rule-top::before, .rule-top::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      max-width: 80px;
      opacity: 0.5;
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 6.5rem);
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: var(--cream);
      margin-bottom: 0.2em;
      opacity: 0;
      animation: fadeUp 1s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 3vw, 1.35rem);
      color: var(--muted);
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 1s 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Countdown */
    .countdown {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .countdown-unit .num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 300;
      color: var(--cream);
      line-height: 1;
      min-width: 2.5ch;
      text-align: center;
    }
    .countdown-unit .label {
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .countdown-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--gold);
      opacity: 0.4;
      align-self: flex-start;
      padding-top: 0.15em;
    }

    /* Email form */
    .notify-form {
      display: flex;
      gap: 0;
      justify-content: center;
      max-width: 420px;
      margin: 0 auto 2.5rem;
      border: 1px solid rgba(184,147,90,0.25);
      opacity: 0;
      animation: fadeUp 1s 0.95s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .notify-form input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.85rem 1.1rem;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      color: var(--cream);
    }
    .notify-form input::placeholder { color: var(--muted); }
    .notify-form button {
      background: var(--gold);
      border: none;
      padding: 0.85rem 1.4rem;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink);
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .notify-form button:hover { background: #c9a46a; }

    .success-msg {
      display: none;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .rule-bottom {
      opacity: 0;
      animation: fadeUp 1s 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .rule-bottom::before, .rule-bottom::after {
      content: '';
      width: 40px;
      height: 1px;
      background: rgba(184,147,90,0.3);
    }
    .rule-bottom span {
      font-size: 1rem;
      color: rgba(184,147,90,0.4);
    }

    .footer-text {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: rgba(138,130,120,0.5);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .countdown { gap: 1rem; }
      .countdown-sep { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="rule-top"><span>Est. 2025</span></div>

    <p class="eyebrow">Something remarkable is on its way</p>

    <h1>Coming<br/><em>Soon</em></h1>
    <p class="subtitle">We're crafting something worth the wait.</p>

    <div class="countdown" id="countdown">
      <div class="countdown-unit"><span class="num" id="days">00</span><span class="label">Days</span></div>
      <div class="countdown-sep">·</div>
      <div class="countdown-unit"><span class="num" id="hours">00</span><span class="label">Hours</span></div>
      <div class="countdown-sep">·</div>
      <div class="countdown-unit"><span class="num" id="mins">00</span><span class="label">Minutes</span></div>
      <div class="countdown-sep">·</div>
      <div class="countdown-unit"><span class="num" id="secs">00</span><span class="label">Seconds</span></div>
    </div>



    <div class="rule-bottom"><span>✦</span></div>
    <p class="footer-text">© 2025 &nbsp;·&nbsp; All rights reserved</p>
  </div>

  <script>
    // Set your launch date here
    const LAUNCH_DATE = new Date('2025-12-31T00:00:00');

    function updateCountdown() {
      const now = new Date();
      const diff = LAUNCH_DATE - now;
      if (diff <= 0) {
        document.getElementById('countdown').innerHTML = '<p style="color:var(--gold);letter-spacing:.2em;font-size:.8rem;">JUST CRACK IT</p>';
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('days').textContent  = String(d).padStart(2,'0');
      document.getElementById('hours').textContent = String(h).padStart(2,'0');
      document.getElementById('mins').textContent  = String(m).padStart(2,'0');
      document.getElementById('secs').textContent  = String(s).padStart(2,'0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    function handleNotify() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        document.getElementById('emailInput').style.borderBottom = '1px solid #c0392b';
        return;
      }
      document.getElementById('notifyForm').style.display = 'none';
      const msg = document.getElementById('successMsg');
      msg.style.display = 'block';
      msg.style.animation = 'fadeUp .6s ease forwards';
    }
  </script>
</body>
</html>
